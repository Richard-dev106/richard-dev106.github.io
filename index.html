<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker Hub</title>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: "Courier New", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  /* scanline effect */
  body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,0,0.05),
      rgba(0,255,0,0.05) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }

  h1 {
    font-size: 40px;
    text-shadow: 0 0 10px #00ff00;
    margin-bottom: 10px;
  }

  h3 {
    font-size: 20px;
    opacity: 0.8;
    margin-bottom: 40px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 140px);
    gap: 30px;
  }

  button {
    width: 140px;
    height: 70px;
    background: black;
    border: 2px solid #00ff00;
    color: #00ff00;
    font-family: monospace;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 10px #00ff00;
  }

  button:hover {
    background: #00ff00;
    color: black;
    box-shadow: 0 0 25px #00ff00;
    animation: glitch 0.2s infinite;
  }

  @keyframes glitch {
    0%   { transform: scale(1.5) translate(0,0); }
    25%  { transform: scale(1.2) translate(-1px,1px); }
    50%  { transform: scale(1.3) translate(1px,-1px); }
    75%  { transform: scale(1.4) translate(-1px,-1px); }
    100% { transform: scale(1.3) translate(0,0); }
  }

</style>
</head>

<body>

<h1>ACCESS TERMINAL</h1>
<h3>let blankButtons === comingSoonProjects;</h3>

<div class="grid">

  <button onclick="location.href='/calculator'">Calculator</button>
  <button onclick="location.href='/neon-box-world'">Neon box world</button>
  <button onclick="location.href='#'"></button>

  <button onclick="location.href='#'"></button>
  <button onclick="location.href='#'"></button>
  <button onclick="location.href='#'"></button>

  <button onclick="location.href='#'"></button>
  <button onclick="location.href='#'"></button>
  <button onclick="location.href='#'"></button>

</div>

</body>
</html>
