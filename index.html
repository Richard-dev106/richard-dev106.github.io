<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Portfolio</title>
  <style>
    :root{
      --glass-tint: 225,241,255;
      --text: 20,24,28;
      --muted: 95,100,110;
      --accent: 59,130,246;
      --radius: 14px;
      --glass-blur: 10px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      color:rgb(var(--text));
      /* Stretch the local GIF (mona-happy.gif) to cover the viewport */
      background: url("./mona-happy.gif") center/cover no-repeat;
      /* fallback color while image loads or if missing */
      background-color: rgb(180,220,255);
      -webkit-font-smoothing:antialiased;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
    }

    .bg-blob{position:fixed; inset:0; z-index:-2; overflow:hidden; pointer-events:none;}
    .bg-blob::after{
      content:"";
      position:absolute;
      inset:-30%;
      background:
        radial-gradient(circle at 10% 20%, rgba(var(--accent),0.06), transparent 12%),
        radial-gradient(circle at 80% 80%, rgba(var(--accent),0.03), transparent 12%);
      animation: float 14s linear infinite;
      filter: blur(36px);
      opacity:0.9;
    }
    @keyframes float{ from{transform:translateY(0) rotate(0)} to{transform:translateY(-6%) rotate(360deg)} }

    .wrap{ width:min(920px,96%); text-align:center; display:grid; gap:1.25rem; align-items:start; }

    h1{ margin:0; font-size:clamp(1.6rem, 3.6vw, 2.4rem); font-weight:700; color:rgb(var(--text)); }

    .card{
      margin-top:0.6rem;
      border-radius:var(--radius);
      padding:1.25rem;
      background:linear-gradient(180deg, rgba(var(--glass-tint),0.92), rgba(var(--glass-tint),0.84));
      border:1px solid rgba(var(--accent),0.10);
      box-shadow: 0 10px 28px rgba(var(--accent),0.04);
      backdrop-filter: blur(var(--glass-blur)) saturate(120%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(120%);
      display:flex;
      flex-direction:column;
      gap:1rem;
      align-items:center;
      max-width:760px;
      margin-left:auto;
      margin-right:auto;
    }

    .card h2{ margin:0; font-size:1.05rem; font-weight:600; color:rgb(var(--text)); }

    .actions{ display:flex; gap:0.75rem; flex-wrap:wrap; justify-content:center; margin-top:0.2rem; }

    /* Button base */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:0.5rem;
      padding:0.6rem 0.9rem;
      border-radius:10px;
      font-weight:600;
      text-decoration:none;
      border:1px solid rgba(16,24,40,0.08);
      background: rgba(255,255,255,0.94);
      color:rgb(var(--text));
      cursor:pointer;
      transition:transform .18s cubic-bezier(.2,.9,.3,1), box-shadow .18s ease, background-color .12s ease, color .12s ease;
      min-width:110px;
      will-change:transform,box-shadow;
      box-shadow: 0 6px 18px rgba(16,24,40,0.06);
    }
    .btn:active{ transform:translateY(1px) }

    /* Primary (project) buttons */
    .btn-primary{
      background: linear-gradient(90deg, rgba(var(--accent),0.98), rgba(var(--accent),0.88));
      border-color: rgba(var(--accent),0.95);
      color: white;
      box-shadow: 0 10px 28px rgba(59,130,246,0.18);
    }

    /* Hover/focus for active buttons: grow & lift */
    .btn-primary:not([disabled]):hover,
    .btn-primary:not([disabled]):focus-visible{
      transform: translateY(-6px) scale(1.06);
      box-shadow: 0 28px 64px rgba(16,24,40,0.14);
    }

    .btn:not([disabled]):hover,
    .btn:not([disabled]):focus-visible{
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 18px 46px rgba(16,24,40,0.12);
    }

    /* Disabled state using native disabled attribute */
    .btn[disabled]{
      opacity:0.85;
      cursor:not-allowed;
      /* allow hover visuals while keeping control disabled */
      pointer-events:auto;
      filter:grayscale(.02);
      transform:none;
      background: rgba(255,255,255,0.86);
      color: rgba(var(--muted),1);
      border:1px solid rgba(16,24,40,0.04);
      box-shadow: none;
      transition: background-color .12s ease, color .12s ease, transform .12s ease;
    }

    /* Coming Soon hover visual (red) for disabled buttons */
    .btn[disabled]:hover{
      background: rgb(255,0,0);
      color: white;
      border-color: rgb(200,0,0);
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 14px 36px rgba(255,0,0,0.12);
    }

    .btn:focus-visible{
      outline:3px solid rgba(var(--accent),0.18);
      outline-offset:4px;
    }

    @media (max-width:420px){
      .actions{gap:0.5rem}
      .btn{min-width:92px; padding:0.55rem 0.7rem}
    }

    @media (prefers-reduced-motion: reduce){
      .bg-blob::after, .btn, .card { transition: none; animation: none; transform: none; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="bg-blob" aria-hidden="true"></div>

  <main class="wrap" role="main">
    <h1>My Portfolio</h1>

    <section class="card" aria-labelledby="card-title">
      <h2 id="card-title">Welcome</h2>

      <div class="actions" id="projects" role="group" aria-label="Portfolio links">
        <!-- Buttons will be rendered here by JavaScript -->
      </div>
    </section>
  </main>

  <script>
    const projects = [
      { title: "Calculator", href: "/calculator" },
      { title: "Neon Box World", href: "/neon-box-world" },
      { title: "My first Website", href: "/my_first_website" },
      { title: "Jubilee generator", href: "/jubilee-generator" },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true },
      { title: "Coming Soon", disabled: true }
    ];

    function renderProjects() {
      const container = document.getElementById('projects');
      container.innerHTML = '';
      projects.forEach((p) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn' + (p.disabled ? '' : ' btn-primary');
        btn.textContent = p.title;

        if (!p.disabled && p.href) {
          btn.setAttribute('aria-label', `${p.title} (opens in new tab)`);
          btn.addEventListener('click', () => {
            const w = window.open(p.href, '_blank');
            if (w) w.opener = null;
          });
        } else {
          btn.disabled = true;
          btn.setAttribute('aria-label', `${p.title} (coming soon)`);
          const emoji = document.createElement('span');
          emoji.setAttribute('aria-hidden', 'true');
          emoji.textContent = '🚧 ';
          btn.prepend(emoji);
        }
        container.appendChild(btn);
      });
    }

    renderProjects();

    function addProject(obj) {
      projects.push(obj);
      renderProjects();
    }
    window.addProject = addProject;
  </script>
</body>
</html>
